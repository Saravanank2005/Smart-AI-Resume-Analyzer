name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/Sarn007/AI_Resume_Analyzer
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Pushing HEAD:main ensures it works even in detached HEAD state
          git push --force https://Sarn007:$HF_TOKEN@huggingface.co/spaces/Sarn007/AI_Resume_Analyzer HEAD:main
